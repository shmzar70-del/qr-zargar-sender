name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create APK folder
        run: |
          mkdir output
          cp index.html output/
          cp jsQR.js output/
          cp qrcode.main.js output/

      - name: Zip package
        run: |
          cd output
          zip -r qr-zargar-sender.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qr-zargar-sender
          path: output/qr-zargar-sender.zip
